<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement Rapide</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .payment-card { background: white; padding: 30px 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 350px; text-align: center; }
        .logo { font-size: 40px; margin-bottom: 10px; }
        h2 { color: #333; margin-bottom: 5px; }
        .info { color: #666; font-size: 14px; margin-bottom: 20px; }
        
        /* Style du champ de montant */
        .amount-input-container { margin: 20px 0; position: relative; }
        input#amountInput {
            width: 100%; padding: 15px; font-size: 28px; font-weight: bold;
            text-align: center; border: 2px solid #007bff; border-radius: 15px;
            color: #007bff; outline: none; box-sizing: border-box;
        }
        .currency { position: absolute; right: 15px; top: 15px; font-weight: bold; color: #007bff; }

        .btn-pay { 
            display: block; background: #007bff; color: white; padding: 18px; 
            border-radius: 50px; text-decoration: none; font-weight: bold; 
            font-size: 18px; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,123,255,0.3);
        }
        .btn-pay:active { transform: scale(0.95); background: #0056b3; }
        .footer-note { font-size: 11px; color: #999; margin-top: 20px; }
    </style>
</head>
<body>

<div class="payment-card">
    <div class="logo">💸</div>
    <h2 id="statusTitle">Finaliser le paiement</h2>
    <p class="info">Vers : <strong id="numDisp">...</strong> (<span id="resDisp">...</span>)</p>

    <div class="amount-input-container">
        <input type="number" id="amountInput" placeholder="0">
        <span class="currency">FCFA</span>
    </div>

    <a href="#" id="ussdLink" class="btn-pay" onclick="preparerUSSD(event)">CONFIRMER ET PAYER</a>
    
    <p class="footer-note">Le code USSD sera préparé sur votre clavier.<br>Il vous suffira d'appuyer sur "Appeler".</p>
</div>

<script>
    // 1. Récupérer les paramètres du lien (numéro et réseau)
    const urlParams = new URLSearchParams(window.location.search);
    const num = urlParams.get('num');
    const res = urlParams.get('res');
    const mtInit = urlParams.get('mt'); // Montant suggéré

    // Affichage des informations de base
    if (num && res) {
        document.getElementById('numDisp').innerText = num;
        document.getElementById('resDisp').innerText = (res === "mixx") ? "Moov Mixx" : "Moov Flooz";
        
        // Si un montant est déjà dans le lien, on le met dans la case
        if (mtInit) {
            document.getElementById('amountInput').value = mtInit;
        }
    } else {
        document.getElementById('statusTitle').innerText = "Lien invalide";
        document.querySelector('.amount-input-container').style.display = "none";
        document.getElementById('ussdLink').style.display = "none";
    }

    // 2. Fonction qui génère le code USSD au moment du clic
    function preparerUSSD(event) {
        const montantSaisi = document.getElementById('amountInput').value;

        if (!montantSaisi || montantSaisi <= 0) {
            alert("Veuillez saisir un montant valide.");
            event.preventDefault();
            return;
        }

        // Construction du code USSD dynamique
        let ussd = (res === "mixx") 
            ? `*145*1*${montantSaisi}*${num}*1#` 
            : `*155*1*1*${num}*${montantSaisi}*1#`;
        
        // Encodage et redirection
        const finalTelLink = `tel:${ussd.replace(/#/g, '%23')}`;
        window.location.href = finalTelLink;
    }
</script>

</body>
</html>
