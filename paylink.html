<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement Rapide</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .payment-card { background: white; padding: 40px 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 350px; text-align: center; }
        .amount { font-size: 32px; font-weight: bold; color: #007bff; margin: 10px 0; }
        .info { color: #666; margin-bottom: 30px; line-height: 1.5; }
        .btn-pay { display: block; background: #007bff; color: white; padding: 18px; border-radius: 50px; text-decoration: none; font-weight: bold; font-size: 20px; box-shadow: 0 4px 15px rgba(0,123,255,0.3); }
    </style>
</head>
<body>

<div class="payment-card" id="cardContent">
    <h2 id="msg">Chargement...</h2>
    <div id="displayInfo" style="display:none;">
        <div class="amount" id="amountDisp">0 FCFA</div>
        <p class="info">Vers le numéro : <br><strong id="numDisp">...</strong><br>(Réseau : <span id="resDisp">...</span>)</p>
        <a href="#" id="ussdLink" class="btn-pay">PAYER MAINTENANT</a>
    </div>
</div>

<script>
    // Récupération des données dans l'URL
    const urlParams = new URLSearchParams(window.location.search);
    const mt = urlParams.get('mt');
    const num = urlParams.get('num');
    const res = urlParams.get('res');

    if (mt && num && res) {
        document.getElementById('msg').innerText = "Confirmez votre paiement";
        document.getElementById('amountDisp').innerText = mt + " FCFA";
        document.getElementById('numDisp').innerText = num;
        document.getElementById('resDisp').innerText = (res === "mixx") ? "Moov Mixx" : "Moov Flooz";
        
        // Création du code USSD
        let ussd = (res === "mixx") 
            ? `*145*1*${mt}*${num}*1#` 
            : `*155*1*1*${num}*${mt}*1#`;
        
        const link = document.getElementById('ussdLink');
        link.href = `tel:${ussd.replace(/#/g, '%23')}`;
        
        document.getElementById('displayInfo').style.display = 'block';
    } else {
        document.getElementById('msg').innerText = "Lien de paiement invalide.";
    }
</script>

</body>
</html>
